<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Tessan Studio Photography</title>
    <link rel="stylesheet" href="main.css">
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="https://use.typekit.net/klr5wnl.css">
</head>
<body>
    <header>
        <nav>
            <ul id="navbar">
                <li><a href="portfolio.html">portfolio</a></li>
                <li><a href="photographers.html">photographers</a></li>
                <li id="logo-item"><a href="index.html"><img id="logo" src="images/logo.svg" alt="Tessan Studio logo"></a></li>
                <li><a href="services.html">services</a></li>
                <li><a href="contact.html">contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div id="contact">
            <h1>Contact Us</h1>
            <p>If you'd like to book a session or have any questions about our services or availability, please reach out through the form below.</p>
            <form>
                <div id="short-input">
                    <label for="name">Name (required):</label>
                    <input type="text" name="name" id="name" placeholder="Enter your name" required>
                    <label for="email">Email (required):</label>
                    <input type="text" name="email" id="email" placeholder="Enter your email" required>
                    <label for="photographer">Preferred Photographer (not required):</label>
                    <input type="text" name="photographer" id="photographer" placeholder="Enter which photographer your message is for">
                </div>
                <div id="long-input">
                    <label for="message">Message (required):</label>
                    <textarea name="message" id="message"  placeholder="Enter your message" required></textarea>
                    <button type="submit">Send</button>
                </div>
            </form>
            <div id="contact-info">
                <p>phone number</p>
                <p>address</p>
                <p>address</p>
            </div>
        </div>
    </main>
    <footer>
        <div class = footer-content>
            <p>&copy; Tessan Studio 2026</p>
        </div>
    </footer>
</body>
